name: Runtime bundles

# Builds the orgasmic CLI/daemon runtime bundle on every supported OS using
# native runners (no cross-compilation), smoke-tests each binary on its own
# platform, and publishes one multi-target runtime-latest.json plus every
# orgasmic-runtime_*.tar.gz to a release tag. This workflow is the SOLE owner of
# the runtime assets; the desktop (Tauri) workflows own only the app + latest.json.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish runtime assets to (nightly, stable, or a throwaway test tag).'
        required: true
        default: nightly
        type: string
      version:
        description: 'Version string (e.g. 0.0.1). Empty => derived 0.99.<run> (use a real semver for stable).'
        required: false
        type: string
      only:
        description: 'Comma-separated target keys to build (e.g. windows-x86_64). Empty => all targets. Use windows-x86_64 to refresh just the Windows runtime on stable without clobbering the locally-published darwin/linux bundles.'
        required: false
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'Release tag to publish runtime assets to.'
        required: true
        type: string
      version:
        description: 'Version string; empty => derived 0.99.<run>.'
        required: false
        type: string
      only:
        description: 'Comma-separated target keys to build. Empty => all targets.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: runtime-bundles-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  setup:
    name: Resolve version and matrix
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          v="${INPUT_VERSION:-}"
          if [ -z "$v" ]; then
            # No explicit version => nightly: a SemVer 2.0 prerelease of the next
            # (in-development) version held in Cargo.toml. Ordering is automatic —
            # last-stable < <base>-nightly.* < <base> (next stable). The channel is
            # the release tag, never encoded in the number. dec_B4147 versioning amendment.
            base="$(sed -n '/^\[workspace.package\]/,/^\[/{ s/^version = "\([^"]*\)".*/\1/p; }' Cargo.toml | head -1)"
            [ -n "$base" ] || { echo "::error::could not read [workspace.package] version from Cargo.toml"; exit 1; }
            v="${base}-nightly.$(date -u +%Y%m%d).${GITHUB_RUN_NUMBER}"
          fi
          if ! printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$'; then
            echo "::error::version '$v' is not a valid semver"; exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "resolved version: $v"
      - id: m
        env:
          ONLY: ${{ inputs.only }}
        run: |
          # Filter the full target matrix by the optional `only` key list so a
          # single-target dispatch (e.g. windows-x86_64) builds just that leg.
          ONLY="$ONLY" node <<'NODE' >> "$GITHUB_OUTPUT"
          const all = [
            { runner: 'macos-14',         target: 'aarch64-apple-darwin',      key: 'darwin-aarch64' },
            // Intel macOS: build on the arm64 runner (macos-13 Intel runners queue
            // indefinitely). Same OS + universal SDK; validated by arch, not run.
            { runner: 'macos-14',         target: 'x86_64-apple-darwin',       key: 'darwin-x86_64', cross: true },
            { runner: 'ubuntu-latest',    target: 'x86_64-unknown-linux-gnu',  key: 'linux-x86_64' },
            { runner: 'ubuntu-24.04-arm', target: 'aarch64-unknown-linux-gnu', key: 'linux-aarch64' },
            { runner: 'windows-latest',   target: 'x86_64-pc-windows-msvc',    key: 'windows-x86_64' },
          ];
          const only = (process.env.ONLY || '').split(',').map((s) => s.trim()).filter(Boolean);
          const include = only.length ? all.filter((e) => only.includes(e.key)) : all;
          if (!include.length) {
            console.error(`::error::no targets matched only='${process.env.ONLY}'`);
            process.exit(1);
          }
          console.log(`matrix=${JSON.stringify({ include })}`);
          NODE
          echo "selected targets: ${ONLY:-all}"

  build:
    name: ${{ matrix.key }}
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        run: npm ci --prefix ui

      # macOS only: import a stable code-signing identity into a throwaway
      # keychain so package-runtime.sh re-signs the binary with a fixed
      # designated requirement (keeps TCC grants across versions). No-op when the
      # secret is absent.
      - name: Setup macOS signing
        if: runner.os == 'macOS'
        env:
          P12_BASE64: ${{ secrets.MACOS_CODESIGN_P12 }}
          P12_PASSWORD: ${{ secrets.MACOS_CODESIGN_P12_PASSWORD }}
          CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail
          if [ -z "${P12_BASE64}" ]; then
            echo "no MACOS_CODESIGN_P12 secret; runtime binary stays ad-hoc signed"
            exit 0
          fi
          keychain="$RUNNER_TEMP/orgasmic-codesign.keychain-db"
          kcpw="$(openssl rand -hex 16)"
          security create-keychain -p "$kcpw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$kcpw" "$keychain"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cs.p12"
          security import "$RUNNER_TEMP/cs.p12" -k "$keychain" -P "$P12_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$kcpw" "$keychain" >/dev/null
          # Add the temp keychain to the search list so codesign can resolve the
          # identity by name (--keychain alone does not make a name lookup work).
          security list-keychains -d user -s "$keychain" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$keychain"
          rm -f "$RUNNER_TEMP/cs.p12"
          echo "available signing identities:"
          security find-identity -v -p codesigning "$keychain"
          {
            echo "ORGASMIC_CODESIGN_KEYCHAIN=$keychain"
            echo "ORGASMIC_CODESIGN_IDENTITY=$CODESIGN_IDENTITY"
          } >> "$GITHUB_ENV"

      - name: Build runtime bundle
        shell: bash
        env:
          VERSION: ${{ needs.setup.outputs.version }}
        run: |
          bash scripts/package-runtime.sh \
            --version "$VERSION" \
            --target "${{ matrix.target }}" \
            --target-key "${{ matrix.key }}" \
            --out-dir dist/runtime

      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          asset_key="$(printf '%s' '${{ matrix.key }}' | tr '-' '_')"
          tarball="$(ls dist/runtime/orgasmic-runtime_*_"${asset_key}".tar.gz)"
          echo "checking $tarball"
          stage="$(mktemp -d)"
          tar -xzf "$tarball" -C "$stage"
          bin="$stage/bin/orgasmic"
          [ -f "$bin" ] || bin="$stage/bin/orgasmic.exe"
          test -f "$stage/runtime-manifest.json"
          test -f "$stage/shipped/skills/orgasmic/SKILL.md"
          if [ "${{ matrix.cross }}" = "true" ]; then
            echo "cross build — verifying binary arch instead of executing:"
            file "$bin"
          else
            "$bin" --version
          fi

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.key }}
          path: dist/runtime/*
          if-no-files-found: error
          # orgasmic:dec_B4147 — these are handed to the publish job within the run;
          # 1-day retention stops ~300 MB of runtime-* artifacts accumulating.
          retention-days: 1

  publish:
    name: Assemble manifest and publish
    needs: [setup, build]
    # Run even if some matrix legs failed (fail-fast: false): merge-not-clobber
    # means publishing the legs that DID build never wipes the other targets.
    if: ${{ always() && needs.setup.result == 'success' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: incoming
          pattern: runtime-*
          merge-multiple: true

      - name: Ensure release exists
        run: |
          set -euo pipefail
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            flags=(--title "orgasmic $TAG" --notes "Runtime bundles $VERSION (${GITHUB_SHA})" --target "$GITHUB_SHA")
            if [ "$TAG" = "stable" ]; then flags+=(--latest); else flags+=(--prerelease); fi
            gh release create "$TAG" "${flags[@]}"
          fi

      - name: Assemble merged runtime-latest.json
        run: |
          set -euo pipefail
          mkdir -p dist
          shopt -s nullglob
          found=(incoming/orgasmic-runtime_*.tar.gz)
          if [ ${#found[@]} -eq 0 ]; then
            echo "::error::no runtime bundles were produced by any matrix leg"; exit 1
          fi
          cp incoming/orgasmic-runtime_*.tar.gz incoming/orgasmic-runtime_*.tar.gz.sha256 dist/
          # orgasmic:dec_B4147 — MERGE, don't clobber: pull the existing manifest off
          # the release and overlay only the targets this run built, so a single-target
          # (Windows) dispatch never wipes the locally-published darwin/linux entries.
          if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -qx 'runtime-latest.json'; then
            gh release download "$TAG" -p runtime-latest.json -O dist/.existing.json --clobber
          else
            echo '{}' > dist/.existing.json
          fi
          REPO="$GITHUB_REPOSITORY" TAG="$TAG" VERSION="$VERSION" COMMIT="$GITHUB_SHA" node <<'NODE'
          const fs = require('node:fs');
          const dir = 'dist';
          let manifest = {};
          try { manifest = JSON.parse(fs.readFileSync(`${dir}/.existing.json`, 'utf8')) || {}; } catch { manifest = {}; }
          if (!manifest.runtimes || typeof manifest.runtimes !== 'object') manifest.runtimes = {};
          // Asset suffix is the target key with '-' replaced by '_' (e.g. key
          // darwin-x86_64 -> ..._darwin_x86_64.tar.gz). Recover the key by
          // splitting os (first segment) from arch (the rest, which may itself
          // contain '_' as in x86_64): os '-' arch.
          const keyFromName = (f) => {
            const m = f.match(/^orgasmic-runtime_.+?_([a-z0-9]+)_(.+)\.tar\.gz$/);
            return m ? `${m[1]}-${m[2]}` : null;
          };
          const built = [];
          for (const f of fs.readdirSync(dir).filter((f) => f.endsWith('.tar.gz')).sort()) {
            const key = keyFromName(f);
            if (!key) continue;
            const sha = fs.readFileSync(`${dir}/${f}.sha256`, 'utf8').trim().split(/\s+/)[0];
            manifest.runtimes[key] = {
              url: `https://github.com/${process.env.REPO}/releases/download/${process.env.TAG}/${f}`,
              sha256: sha,
              version: process.env.VERSION, // per-target version; lagging targets keep their own
            };
            built.push(key);
          }
          manifest.version = process.env.VERSION; // top-level fallback for older installers
          manifest.channel = process.env.TAG === 'stable' ? 'stable' : (manifest.channel || 'nightly');
          manifest.commit = process.env.COMMIT;
          manifest.pub_date = new Date().toISOString();
          fs.writeFileSync(`${dir}/runtime-latest.json`, `${JSON.stringify(manifest, null, 2)}\n`);
          console.log(`built targets:   ${built.join(', ')}`);
          console.log(`merged manifest: ${Object.keys(manifest.runtimes).join(', ')}`);
          NODE
          rm -f dist/.existing.json
          echo "=== runtime-latest.json ==="
          cat dist/runtime-latest.json

      - name: Replace built runtime assets on release
        run: |
          set -euo pipefail
          # Delete ONLY the assets for the targets we just built (+ the manifest);
          # leave every other target's tarball in place. Merge, not clobber.
          existing="$(gh release view "$TAG" --json assets --jq '.assets[].name')"
          delete_asset() {
            if printf '%s\n' "$existing" | grep -qx "$1"; then
              gh release delete-asset "$TAG" "$1" --yes
            fi
          }
          for f in dist/orgasmic-runtime_*.tar.gz; do
            base="$(basename "$f")"
            delete_asset "$base"
            delete_asset "$base.sha256"
          done
          delete_asset "runtime-latest.json"
          gh release upload "$TAG" \
            dist/runtime-latest.json \
            dist/orgasmic-runtime_*.tar.gz \
            dist/orgasmic-runtime_*.tar.gz.sha256 \
            --clobber
