name: Stable macOS app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.0.1). Required for manual dispatch.'
        required: false

permissions:
  contents: write

concurrency:
  group: stable-macos-app
  cancel-in-progress: true

jobs:
  publish-stable-macos:
    name: Build and publish macOS stable
    runs-on: macos-latest

    env:
      STABLE_TAG: stable
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci --prefix ui

      - name: Prepare stable version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const refName = process.env.GITHUB_REF_NAME || '';
          const refType = process.env.GITHUB_REF_TYPE || '';
          const inputVersion = (process.env.INPUT_VERSION || '').trim();
          const version = inputVersion || (refType === 'tag' ? refName.replace(/^v/, '') : '');
          if (!/^\d+\.\d+\.\d+([-.+].*)?$/.test(version)) {
            console.error(
              `::error::could not derive a semver version (ref=${refName} type=${refType} input=${inputVersion}); push a vX.Y.Z tag or pass the version input`,
            );
            process.exit(1);
          }

          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauriConfig.version = version;
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

          const packagePath = 'ui/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const cargoPath = 'src-tauri/Cargo.toml';
          const cargoToml = fs.readFileSync(cargoPath, 'utf8').replace(
            /^version = ".*"$/m,
            `version = "${version}"`,
          );
          fs.writeFileSync(cargoPath, cargoToml);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          NODE

      - name: Verify signing key
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for updater artifacts"
            exit 1
          fi

      - name: Build macOS bundle
        run: npm --prefix ui run tauri:bundle:mac

      - name: Build runtime bundle
        env:
          STABLE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          bash scripts/package-runtime.sh \
            --version "${STABLE_VERSION}" \
            --target aarch64-apple-darwin \
            --target-key darwin-aarch64 \
            --out-dir dist/stable

      - name: Stage macOS release assets
        env:
          STABLE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/stable

          dmg_path="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name 'orgasmic_*_aarch64.dmg' -print -quit)"
          update_path="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/orgasmic.app.tar.gz"
          signature_path="${update_path}.sig"

          if [ -z "${dmg_path}" ] || [ ! -f "${update_path}" ] || [ ! -f "${signature_path}" ]; then
            echo "::error::Expected Tauri DMG and desktop updater artifacts were not produced"
            exit 1
          fi

          cp "${dmg_path}" dist/stable/orgasmic_stable_aarch64.dmg
          cp "${update_path}" dist/stable/orgasmic.app.tar.gz
          cp "${signature_path}" dist/stable/orgasmic.app.tar.gz.sig
          runtime_asset="orgasmic-runtime_${STABLE_VERSION}_darwin_aarch64.tar.gz"
          runtime_path="dist/stable/${runtime_asset}"
          runtime_sha_path="${runtime_path}.sha256"
          if [ ! -f "${runtime_path}" ] || [ ! -f "${runtime_sha_path}" ]; then
            echo "::error::Expected runtime bundle was not produced"
            exit 1
          fi

          SIGNATURE_PATH="dist/stable/orgasmic.app.tar.gz.sig" \
          MANIFEST_PATH="dist/stable/latest.json" \
          UPDATE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${STABLE_TAG}/orgasmic.app.tar.gz" \
          node <<'NODE'
          const fs = require('node:fs');

          const manifest = {
            version: process.env.STABLE_VERSION,
            notes: `Stable macOS build ${process.env.STABLE_VERSION} from ${process.env.GITHUB_SHA}`,
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': {
                signature: fs.readFileSync(process.env.SIGNATURE_PATH, 'utf8').trim(),
                url: process.env.UPDATE_URL,
              },
            },
          };

          fs.writeFileSync(process.env.MANIFEST_PATH, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          RUNTIME_MANIFEST_PATH="dist/stable/runtime-latest.json" \
          RUNTIME_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${STABLE_TAG}/${runtime_asset}" \
          RUNTIME_SHA256="$(cat "${runtime_sha_path}")" \
          node <<'NODE'
          const fs = require('node:fs');

          const manifest = {
            version: process.env.STABLE_VERSION,
            channel: 'stable',
            pub_date: new Date().toISOString(),
            runtimes: {
              'darwin-aarch64': {
                url: process.env.RUNTIME_URL,
                sha256: process.env.RUNTIME_SHA256.trim(),
              },
            },
          };

          fs.writeFileSync(process.env.RUNTIME_MANIFEST_PATH, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Publish macOS stable release assets
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          title="orgasmic ${STABLE_VERSION}"
          notes="Stable release ${STABLE_VERSION} from ${GITHUB_SHA}."

          git tag -f "${STABLE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${STABLE_TAG}" --force

          if gh release view "${STABLE_TAG}" >/dev/null 2>&1; then
            gh release edit "${STABLE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}" \
              --prerelease=false \
              --latest=true
          else
            gh release create "${STABLE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}" \
              --latest=true || \
            gh release edit "${STABLE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}" \
              --prerelease=false \
              --latest=true
          fi

          gh release view "${STABLE_TAG}" --json assets --jq '.assets[].name' |
            while IFS= read -r asset; do
              case "${asset}" in
                orgasmic_*_aarch64.dmg|orgasmic.app.tar.gz|orgasmic.app.tar.gz.sig|latest.json|runtime-latest.json|orgasmic-runtime_*_darwin_*.tar.gz|orgasmic-runtime_*_darwin_*.tar.gz.sha256)
                  gh release delete-asset "${STABLE_TAG}" "${asset}" --yes
                  ;;
              esac
            done

          gh release upload "${STABLE_TAG}" dist/stable/* --clobber
