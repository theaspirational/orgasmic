name: macOS app (apps release)

# orgasmic:dec_B4147 — apps are a separate, fully-manual release line. Dispatch
# only (no v* tag trigger), published to the `apps-stable` release/tag so it never
# races the runtime's `stable` release. App version comes from src-tauri/tauri.conf.json
# (decoupled from the workspace Cargo.toml / CLI version).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Override app version (e.g. 0.0.5). Empty => use src-tauri/tauri.conf.json.'
        required: false

permissions:
  contents: write

concurrency:
  group: apps-macos
  cancel-in-progress: true

jobs:
  publish-apps-macos:
    name: Build and publish macOS app
    runs-on: macos-latest

    env:
      APPS_TAG: apps-stable
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install frontend dependencies
        run: npm ci --prefix ui

      - name: Resolve app version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          // App version is sourced from tauri.conf.json (decoupled from the CLI /
          // workspace Cargo.toml). An optional input override re-stamps the app
          // files; with no override we publish exactly what the tree declares.
          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          const inputVersion = (process.env.INPUT_VERSION || '').trim();
          const version = inputVersion || tauriConfig.version || '';
          if (!/^\d+\.\d+\.\d+([-.+].*)?$/.test(version)) {
            console.error(
              `::error::no valid app version (tauri.conf.json=${tauriConfig.version} input=${inputVersion})`,
            );
            process.exit(1);
          }

          if (inputVersion) {
            tauriConfig.version = version;
            fs.writeFileSync(tauriPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

            const packagePath = 'ui/package.json';
            const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
            packageJson.version = version;
            fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);

            const cargoPath = 'src-tauri/Cargo.toml';
            const cargoToml = fs.readFileSync(cargoPath, 'utf8').replace(
              /^version = ".*"$/m,
              `version = "${version}"`,
            );
            fs.writeFileSync(cargoPath, cargoToml);
          }

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          console.log(`app version: ${version}${inputVersion ? ' (override)' : ' (from tauri.conf.json)'}`);
          NODE

      - name: Verify signing key
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for updater artifacts"
            exit 1
          fi

      - name: Build macOS bundle
        run: npm --prefix ui run tauri:bundle:mac

      - name: Stage macOS release assets
        env:
          APPS_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist/apps

          dmg_path="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name 'orgasmic_*_aarch64.dmg' -print -quit)"
          update_path="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/orgasmic.app.tar.gz"
          signature_path="${update_path}.sig"

          if [ -z "${dmg_path}" ] || [ ! -f "${update_path}" ] || [ ! -f "${signature_path}" ]; then
            echo "::error::Expected Tauri DMG and desktop updater artifacts were not produced"
            exit 1
          fi

          # Version-less asset name (dec_B4147): version lives in latest.json, so
          # each publish clobbers the same file and nothing orphans.
          cp "${dmg_path}" "dist/apps/orgasmic_darwin_aarch64.dmg"
          cp "${update_path}" dist/apps/orgasmic.app.tar.gz
          cp "${signature_path}" dist/apps/orgasmic.app.tar.gz.sig

          SIGNATURE_PATH="dist/apps/orgasmic.app.tar.gz.sig" \
          MANIFEST_PATH="dist/apps/latest.json" \
          UPDATE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${APPS_TAG}/orgasmic.app.tar.gz" \
          node <<'NODE'
          const fs = require('node:fs');

          const manifest = {
            version: process.env.APPS_VERSION,
            notes: `macOS app ${process.env.APPS_VERSION} from ${process.env.GITHUB_SHA}`,
            pub_date: new Date().toISOString(),
            platforms: {
              'darwin-aarch64': {
                signature: fs.readFileSync(process.env.SIGNATURE_PATH, 'utf8').trim(),
                url: process.env.UPDATE_URL,
              },
            },
          };

          fs.writeFileSync(process.env.MANIFEST_PATH, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Publish macOS app release assets
        env:
          GH_TOKEN: ${{ github.token }}
          APPS_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          # No v* / stable tag is moved: apps own the dedicated `apps-stable` release/tag,
          # which gh points at this commit. Runtime owns `stable`; they never collide.
          # --latest=false so the apps release never steals the "latest" badge from
          # the runtime `stable` release.
          bash scripts/sync-release-metadata.sh \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$APPS_TAG" \
            --line apps \
            --channel stable \
            --version "$APPS_VERSION" \
            --commit "$GITHUB_SHA"

          # Version-less asset names (dec_B4147): --clobber overwrites in place,
          # so nothing orphans and there is no delete/prune step.
          gh release upload "${APPS_TAG}" dist/apps/* --clobber
