name: Stable Runtime bundles

# Tag-driven wrapper: on a v* tag (or manual dispatch with a version), publishes
# the multi-platform CLI/daemon runtime bundles to the stable release tag via the
# reusable runtime-bundles.yml matrix. Stable counterpart of nightly-runtime.yml.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.0.1). Required for manual dispatch.'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: stable-runtime
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          v="${INPUT_VERSION:-}"
          if [ -z "$v" ] && [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
          fi
          if ! printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+([-.+].*)?$'; then
            echo "::error::could not resolve a semver version (ref=${GITHUB_REF_NAME:-} type=${GITHUB_REF_TYPE:-} input=${INPUT_VERSION:-}); push a vX.Y.Z tag or pass the version input"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "resolved version: $v"

  bundles:
    needs: resolve
    uses: ./.github/workflows/runtime-bundles.yml
    permissions:
      contents: write
    with:
      tag: stable
      version: ${{ needs.resolve.outputs.version }}
