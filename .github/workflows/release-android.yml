name: Stable Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.0.1). Required for manual dispatch.'
        required: false

permissions:
  contents: write

concurrency:
  group: stable-android-apk
  cancel-in-progress: true

jobs:
  publish-stable-android:
    name: Build and publish Android stable
    runs-on: macos-latest

    env:
      STABLE_TAG: stable
      ANDROID_NDK_VERSION: 29.0.14206865
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install frontend dependencies
        run: npm ci --prefix ui

      - name: Prepare Android stable version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const refName = process.env.GITHUB_REF_NAME || '';
          const refType = process.env.GITHUB_REF_TYPE || '';
          const inputVersion = (process.env.INPUT_VERSION || '').trim();
          const version = inputVersion || (refType === 'tag' ? refName.replace(/^v/, '') : '');
          const match = /^(\d+)\.(\d+)\.(\d+)([-.+].*)?$/.exec(version);
          if (!match) {
            console.error(
              `::error::could not derive a semver version (ref=${refName} type=${refType} input=${inputVersion}); push a vX.Y.Z tag or pass the version input`,
            );
            process.exit(1);
          }
          // Monotonic Android versionCode from semver: major*10000 + minor*100 + patch.
          const versionCode =
            Number(match[1]) * 10000 + Number(match[2]) * 100 + Number(match[3]);

          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauriConfig.version = version;
          fs.writeFileSync(tauriPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

          const androidTauriPath = 'src-tauri/tauri.android.conf.json';
          const androidTauriConfig = JSON.parse(fs.readFileSync(androidTauriPath, 'utf8'));
          androidTauriConfig.bundle.android.versionCode = versionCode;
          fs.writeFileSync(androidTauriPath, `${JSON.stringify(androidTauriConfig, null, 2)}\n`);

          const packagePath = 'ui/package.json';
          const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          packageJson.version = version;
          fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);

          const cargoPath = 'src-tauri/Cargo.toml';
          const cargoToml = fs.readFileSync(cargoPath, 'utf8').replace(
            /^version = ".*"$/m,
            `version = "${version}"`,
          );
          fs.writeFileSync(cargoPath, cargoToml);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version_code=${versionCode}\n`);
          NODE

      - name: Verify Android signing keys
        run: |
          for name in ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD ANDROID_KEY_BASE64; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} secret is required for signed Android sideload APKs"
              exit 1
            fi
          done

      - name: Setup Android signing
        run: |
          set -euo pipefail
          mkdir -p src-tauri/gen/android
          {
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "password=${ANDROID_KEY_PASSWORD}"
            echo "storeFile=${RUNNER_TEMP}/orgasmic-android-upload.jks"
          } > src-tauri/gen/android/keystore.properties
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          target = Path(os.environ["RUNNER_TEMP"]) / "orgasmic-android-upload.jks"
          target.write_bytes(base64.b64decode(os.environ["ANDROID_KEY_BASE64"]))
          PY

      - name: Build Android APK
        run: |
          export NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_HOME="${NDK_HOME}"
          npm --prefix ui run tauri:android:build

      - name: Stage Android release assets
        env:
          STABLE_VERSION: ${{ steps.version.outputs.version }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail
          mkdir -p dist/stable

          apk_path="$(find src-tauri/gen/android/app/build/outputs/apk -path '*/release/*' -name '*.apk' -print -quit)"
          if [ -z "${apk_path}" ]; then
            echo "::error::Expected Android APK was not produced"
            exit 1
          fi

          android_apk_name="orgasmic_${STABLE_VERSION}_${ANDROID_VERSION_CODE}_android_aarch64.apk"
          cp "${apk_path}" "dist/stable/${android_apk_name}"

          apk_sha256="$(shasum -a 256 "dist/stable/${android_apk_name}" | awk '{print $1}')"

          ANDROID_MANIFEST_PATH="dist/stable/android-latest.json" \
          ANDROID_APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${STABLE_TAG}/${android_apk_name}" \
          ANDROID_APK_SHA256="${apk_sha256}" \
          node <<'NODE'
          const fs = require('node:fs');

          const manifest = {
            channel: process.env.STABLE_TAG,
            packageName: 'com.theaspirational.orgasmic',
            version: process.env.STABLE_VERSION,
            versionCode: Number(process.env.ANDROID_VERSION_CODE),
            notes: `Stable Android APK ${process.env.STABLE_VERSION} from ${process.env.GITHUB_SHA}`,
            pubDate: new Date().toISOString(),
            apkUrl: process.env.ANDROID_APK_URL,
            apkSha256: process.env.ANDROID_APK_SHA256,
          };

          fs.writeFileSync(process.env.ANDROID_MANIFEST_PATH, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Publish Android stable release assets
        env:
          GH_TOKEN: ${{ github.token }}
          STABLE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          title="orgasmic ${STABLE_VERSION}"
          notes="Stable release ${STABLE_VERSION} from ${GITHUB_SHA}."

          git tag -f "${STABLE_TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${STABLE_TAG}" --force

          if gh release view "${STABLE_TAG}" >/dev/null 2>&1; then
            gh release edit "${STABLE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}" \
              --prerelease=false \
              --latest=true
          else
            gh release create "${STABLE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}" \
              --latest=true || \
            gh release edit "${STABLE_TAG}" \
              --target "${GITHUB_SHA}" \
              --title "${title}" \
              --notes "${notes}" \
              --prerelease=false \
              --latest=true
          fi

          gh release view "${STABLE_TAG}" --json assets --jq '.assets[].name' |
            while IFS= read -r asset; do
              case "${asset}" in
                orgasmic_*_android_*.apk|android-latest.json)
                  gh release delete-asset "${STABLE_TAG}" "${asset}" --yes
                  ;;
              esac
            done

          gh release upload "${STABLE_TAG}" dist/stable/* --clobber
