name: Android APK (apps release)

# orgasmic:dec_B4147 — apps are a separate, fully-manual release line. Dispatch
# only (no v* tag trigger), published to the `apps-stable` release/tag so it never
# races the runtime's `stable` release. App version comes from src-tauri/tauri.conf.json
# (decoupled from the workspace Cargo.toml / CLI version).
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Override app version (e.g. 0.0.5). Empty => use src-tauri/tauri.conf.json.'
        required: false

permissions:
  contents: write

concurrency:
  group: apps-android
  cancel-in-progress: true

jobs:
  publish-apps-android:
    name: Build and publish Android app
    runs-on: macos-latest

    env:
      APPS_TAG: apps-stable
      ANDROID_NDK_VERSION: 29.0.14206865
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;35.0.0" \
            "ndk;${ANDROID_NDK_VERSION}"

      - name: Install frontend dependencies
        run: npm ci --prefix ui

      - name: Resolve Android app version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          // App version is sourced from tauri.conf.json (decoupled from the CLI /
          // workspace Cargo.toml). An optional input override re-stamps the app
          // files; with no override we publish exactly what the tree declares.
          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauriConfig = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          const inputVersion = (process.env.INPUT_VERSION || '').trim();
          const version = inputVersion || tauriConfig.version || '';
          const match = /^(\d+)\.(\d+)\.(\d+)([-.+].*)?$/.exec(version);
          if (!match) {
            console.error(
              `::error::no valid app version (tauri.conf.json=${tauriConfig.version} input=${inputVersion})`,
            );
            process.exit(1);
          }
          // Monotonic Android versionCode = build-time epoch seconds — one scale
          // shared with local (publish-apps.sh) and the nightly workflow, so every
          // later build (nightly or stable) sorts above earlier ones and channel
          // switches stay in-place updates. Fits signed int32 until 2038. dec_B4147.
          const versionCode = Math.floor(Date.now() / 1000);

          if (inputVersion) {
            tauriConfig.version = version;
            fs.writeFileSync(tauriPath, `${JSON.stringify(tauriConfig, null, 2)}\n`);

            const packagePath = 'ui/package.json';
            const packageJson = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
            packageJson.version = version;
            fs.writeFileSync(packagePath, `${JSON.stringify(packageJson, null, 2)}\n`);

            const cargoPath = 'src-tauri/Cargo.toml';
            const cargoToml = fs.readFileSync(cargoPath, 'utf8').replace(
              /^version = ".*"$/m,
              `version = "${version}"`,
            );
            fs.writeFileSync(cargoPath, cargoToml);
          }

          // versionCode is always stamped from the resolved version so the APK is
          // monotonic regardless of override.
          const androidTauriPath = 'src-tauri/tauri.android.conf.json';
          const androidTauriConfig = JSON.parse(fs.readFileSync(androidTauriPath, 'utf8'));
          androidTauriConfig.bundle.android.versionCode = versionCode;
          fs.writeFileSync(androidTauriPath, `${JSON.stringify(androidTauriConfig, null, 2)}\n`);

          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${version}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version_code=${versionCode}\n`);
          console.log(`android app version: ${version} (code ${versionCode})${inputVersion ? ' (override)' : ' (from tauri.conf.json)'}`);
          NODE

      - name: Verify Android signing keys
        run: |
          for name in ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD ANDROID_KEY_BASE64; do
            if [ -z "${!name}" ]; then
              echo "::error::${name} secret is required for signed Android sideload APKs"
              exit 1
            fi
          done

      - name: Setup Android signing
        run: |
          set -euo pipefail
          mkdir -p src-tauri/gen/android
          {
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
            echo "password=${ANDROID_KEY_PASSWORD}"
            echo "storeFile=${RUNNER_TEMP}/orgasmic-android-upload.jks"
          } > src-tauri/gen/android/keystore.properties
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          target = Path(os.environ["RUNNER_TEMP"]) / "orgasmic-android-upload.jks"
          target.write_bytes(base64.b64decode(os.environ["ANDROID_KEY_BASE64"]))
          PY

      - name: Build Android APK
        run: |
          export NDK_HOME="${ANDROID_HOME}/ndk/${ANDROID_NDK_VERSION}"
          export ANDROID_NDK_HOME="${NDK_HOME}"
          npm --prefix ui run tauri:android:build

      - name: Stage Android release assets
        env:
          APPS_VERSION: ${{ steps.version.outputs.version }}
          ANDROID_VERSION_CODE: ${{ steps.version.outputs.version_code }}
        run: |
          set -euo pipefail
          mkdir -p dist/apps

          apk_path="$(find src-tauri/gen/android/app/build/outputs/apk -path '*/release/*' -name '*.apk' -print -quit)"
          if [ -z "${apk_path}" ]; then
            echo "::error::Expected Android APK was not produced"
            exit 1
          fi

          # Version-less name (dec_B4147): version + versionCode live in
          # android-latest.json (and inside the APK), so each publish clobbers the
          # same file and nothing orphans.
          android_apk_name="orgasmic_android_aarch64.apk"
          cp "${apk_path}" "dist/apps/${android_apk_name}"

          apk_sha256="$(shasum -a 256 "dist/apps/${android_apk_name}" | awk '{print $1}')"

          ANDROID_MANIFEST_PATH="dist/apps/android-latest.json" \
          ANDROID_APK_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${APPS_TAG}/${android_apk_name}" \
          ANDROID_APK_SHA256="${apk_sha256}" \
          node <<'NODE'
          const fs = require('node:fs');

          const manifest = {
            channel: process.env.APPS_TAG,
            packageName: 'com.theaspirational.orgasmic',
            version: process.env.APPS_VERSION,
            versionCode: Number(process.env.ANDROID_VERSION_CODE),
            notes: `Android APK ${process.env.APPS_VERSION} from ${process.env.GITHUB_SHA}`,
            pubDate: new Date().toISOString(),
            apkUrl: process.env.ANDROID_APK_URL,
            apkSha256: process.env.ANDROID_APK_SHA256,
          };

          fs.writeFileSync(process.env.ANDROID_MANIFEST_PATH, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

      - name: Publish Android app release assets
        env:
          GH_TOKEN: ${{ github.token }}
          APPS_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          # No v* / stable tag is moved: apps own the dedicated `apps-stable` release/tag.
          # --latest=false so it never steals the runtime `stable` release's badge.
          bash scripts/sync-release-metadata.sh \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$APPS_TAG" \
            --line apps \
            --channel stable \
            --version "$APPS_VERSION" \
            --commit "$GITHUB_SHA"

          # Version-less asset names (dec_B4147): --clobber overwrites in place,
          # so nothing orphans and there is no delete/prune step.
          gh release upload "${APPS_TAG}" dist/apps/* --clobber
